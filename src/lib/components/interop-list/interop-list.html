@for (
    item of items();
    track trackByFn($index, item);
    let i = $index;
    let first = $first;
    let last = $last
) {
    <li>
        @if (listItemTemplate()) {
            <ng-container
                [ngTemplateOutlet]="listItemTemplate()"
                [ngTemplateOutletContext]="{
                    $implicit: item,
                    item: item,
                    index: i,
                    first: first,
                    last: last,
                }"
            >
            </ng-container>
        } @else {
            {{ getItemText(item) }}
        }
    </li>
}

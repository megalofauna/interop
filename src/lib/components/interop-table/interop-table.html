<!-- Loading state -->
<tbody *ngIf="isLoading()" class="interop-table-loading">
    <tr>
        <td
            [attr.colspan]="resolvedColumns().length || 1"
            class="interop-table-loading-cell"
        >
            <div class="interop-table-loading-content">{{ loadingText() }}</div>
        </td>
    </tr>
</tbody>

<!-- Error state -->
<tbody *ngIf="hasError() && !isLoading()" class="interop-table-error">
    <tr>
        <td
            [attr.colspan]="resolvedColumns().length || 1"
            class="interop-table-error-cell"
        >
            <div class="interop-table-error-content">
                <ng-content select="[slot=error]">
                    <span class="interop-table-default-error"
                        >Error loading data</span
                    >
                </ng-content>
            </div>
        </td>
    </tr>
</tbody>

<!-- Empty state -->
<tbody
    *ngIf="isEmpty() && !isLoading() && !hasError()"
    class="interop-table-empty"
>
    <tr>
        <td
            [attr.colspan]="resolvedColumns().length || 1"
            class="interop-table-empty-cell"
        >
            <div class="interop-table-empty-content">
                <ng-content select="[slot=empty]">
                    <span class="interop-table-default-empty"
                        >{{ emptyText() }}</span
                    >
                </ng-content>
            </div>
        </td>
    </tr>
</tbody>

<!-- Table header -->
<thead
    *ngIf="showHeaders() && resolvedColumns().length > 0 && !isLoading() && !hasError() && !isEmpty()"
    class="interop-table-header"
>
    <tr class="interop-table-header-row">
        <th
            *ngFor="let column of resolvedColumns(); let colIndex = index; trackBy: trackByColumnIndex"
            class="interop-table-header-cell"
            [attr.data-column-key]="column.key"
        >
            <span class="interop-table-header-text">
                {{ getColumnLabel(column) }}
            </span>
        </th>
    </tr>
</thead>

<!-- Table body with data -->
<tbody
    *ngIf="!isLoading() && !hasError() && !isEmpty()"
    class="interop-table-body"
>
    <tr
        *ngFor="let item of items(); trackBy: trackByFn; let rowIndex = index"
        class="interop-table-row"
        [attr.data-row-index]="rowIndex"
    >
        <td
            *ngFor="let column of resolvedColumns(); let colIndex = index"
            class="interop-table-cell"
            [attr.data-column-key]="column.key"
            [attr.data-cell-index]="colIndex"
        >
            <span class="interop-table-cell-text">
                {{ getCellText(item, column) }}
            </span>
        </td>
    </tr>
</tbody>

<!-- Projected content for additional customization -->
<ng-content></ng-content>

@if (loading()) {
<!-- During loading, show loading slot with fallback to loadingText -->
<ng-content select="[slot='loading-spinner']">
    <span data-interop-loading>{{ loadingText() }}</span>
</ng-content>
} @else {
<!-- When not loading, project ALL content in original DOM source order -->
<!-- This preserves the natural order of icon slots and text content -->
<ng-content></ng-content>
}

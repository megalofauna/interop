<!-- ── figcaption header bar ──────────────────────────────────────────────────
  Generated by the component. The consumer provides only the code content.
  role="toolbar" is correct ARIA for a group of controls that operate on content.
  Actions are hidden at rest and revealed on :hover / :focus-within via CSS.
──────────────────────────────────────────────────────────────────────────── -->
<figcaption class="itx-code-block__header">
  <span class="itx-code-block__label" aria-hidden="true">
    @if (headerLabel()) {
      {{ headerLabel() }}
    }
  </span>

  <div
    class="itx-code-block__actions"
    role="toolbar"
    [attr.aria-label]="(headerLabel() ? headerLabel() + ' — ' : '') + 'code block actions'"
  >
    @if (wrapToggle()) {
      <button
        interop-button
        class="itx-code-block__action-btn itx-code-block__wrap-btn"
        type="button"
        [attr.aria-pressed]="isWrapped()"
        [attr.aria-label]="isWrapped() ? 'Disable word wrap' : 'Enable word wrap'"
        [onActivate]="handleWrapToggle"
      >
        <!-- Word wrap icon — aria-hidden because the button has a descriptive aria-label -->
        <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2 4h12M2 8h7a3 3 0 0 1 0 6H7m1.5-1.5L7 14l1.5 1.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
    }

    <button
      interop-button
      class="itx-code-block__action-btn itx-code-block__copy-btn"
      type="button"
      [attr.aria-label]="copyAriaLabel()"
      [onActivate]="handleCopy"
      [activationOptions]="copyActivationOptions"
    >
      @if (isCopied()) {
        <!-- Checkmark — shown after successful copy -->
        <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M2.5 8.5l4 4 7-7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      } @else {
        <!-- Copy icon -->
        <svg aria-hidden="true" focusable="false" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="5.5" y="5.5" width="8" height="9" rx="1" stroke="currentColor" stroke-width="1.5"/>
          <path d="M4 10.5H3a1 1 0 0 1-1-1V3a1 1 0 0 1 1-1h7a1 1 0 0 1 1 1v1" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      }
    </button>
  </div>
</figcaption>

<!-- ── Screen reader announcement for copy feedback ──────────────────────────
  The aria-live region is always present in the DOM. Text appears when isCopied()
  is true and disappears when it resets — the DOM mutation is what triggers the
  announcement. aria-atomic ensures the full string is read, not just the diff.
──────────────────────────────────────────────────────────────────────────── -->
<span class="itx-code-block__sr-announce" aria-live="polite" aria-atomic="true">
  @if (isCopied()) {
    Copied to clipboard
  }
</span>

<!-- ── Code body ──────────────────────────────────────────────────────────────
  Two rendering paths:
  1. tokens input: renders pre-tokenized lines with optional line numbers.
  2. no tokens: projects consumer's <pre><code> content as-is.

  IMPORTANT: whitespace inside <pre> is significant. The @for contents must be
  flush-left and produce no extra whitespace between spans.
──────────────────────────────────────────────────────────────────────────── -->
<div class="itx-code-block__body">
  @if (tokens(); as tokenLines) {
    <!-- prettier-ignore -->
    <pre class="itx-code-block__pre" [attr.aria-label]="languageLabel() ? languageLabel() + ' code' : null"><code class="itx-code-block__code">@for (line of tokenLines; track $index) {<span class="itx-code-block__line">@if (lineNumbers()) {<span class="itx-code-block__line-number" aria-hidden="true">{{ $index + 1 }}</span>}<span class="itx-code-block__line-content">@for (t of line.tokens; track $index) {<span class="itx-code-block__token" [style.color]="t.color ?? null" [style.font-style]="(t.fontStyle === 1 || t.fontStyle === 3) ? 'italic' : null" [style.font-weight]="(t.fontStyle === 2 || t.fontStyle === 3) ? 'bold' : null">{{ t.text }}</span>}</span></span>}</code></pre>
  } @else {
    <!-- Projection path: consumer provides their own <pre><code> -->
    <ng-content />
  }
</div>

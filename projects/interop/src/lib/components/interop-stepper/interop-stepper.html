<!--
  Three-region single-column layout (top to bottom):

    1. nav      — full step list on wide viewports; compact menu trigger on narrow
                  (vertical: trigger only — step list lives in the popover)
    2. viewport — the active step's panel content (scroll-snap)
    3. actions  — toolbar (cancel ↔ back | next), shown only on wide when menu="always"

  Slot routing:
    - ol[interop-step-list]       → nav (horizontal; responsive via container query)
    - [stepListTemplate]          → popover (vertical; ng-template input)
    - [interop-stepper-actions]   → actions (replaces the default action bar)
    - everything else (panels)    → viewport (default slot)

  The actions region renders a built-in bar (Back / Next, plus optional
  Cancel and a responsive menu trigger). Consumers can fully replace it by
  projecting any element with the [interop-stepper-actions] selector — that
  content takes the place of the default. Set [actions]="false" to drop the
  region entirely.

  The popover menu is shared between the nav-trigger (narrow) and the
  action-bar menu button (wide + menu="always"). Both bind to the same
  InteropPopover instance via the #menuPopover template ref. Only one
  trigger is in layout at a time (the other is display:none from the
  container query).
-->
<nav class="interop-stepper__nav" [attr.aria-label]="ariaLabel()">
	@if (menu() === "never") {
	<div
		class="interop-stepper__nav-trigger interop-stepper__nav-trigger--passive"
	>
		<interop-icon name="tabler-list" [size]="14" />
		<span class="interop-stepper__nav-summary">{{ activeStepLabel() }}</span>
		<span class="interop-stepper__nav-progress"
			>{{ activeIndex() + 1 }}/{{ totalSteps() }}</span
		>
	</div>
	} @else {
	<button
		interop-button="protocol md"
		type="button"
		class="interop-stepper__nav-trigger"
		[interop-popover-trigger]="menuPopover"
		[popoverHaspopup]="'menu'"
		[attr.aria-label]="menuLabel()"
	>
		<interop-icon name="tabler-list" [size]="24" />
		<span class="interop-stepper__nav-summary">{{ activeStepLabel() }}</span>
		<span spacer style="flex: 1"></span>
		<span class="interop-stepper__nav-progress"
			>Step {{ activeIndex() + 1 }} of {{ totalSteps() }}</span
		>
		<span spacer style="flex: 0.0125"></span>
		<interop-icon
			class="interop-stepper__nav-arrow"
			name="tabler-chevron-down"
			[size]="20"
			[color]="'var(--itx-neutral-10)'"
		></interop-icon>
	</button>
	}
	<!--
	  Horizontal default: the projected step list lives inside an
	  InteropScrollArea so a narrow viewport can scroll the strip horizontally
	  with shadow fades at the scrollable edges. Each step item keeps its
	  natural width (set in the CSS narrow-viewport block), so labels never
	  truncate. The scroll-area exposes no aria-label — the surrounding <nav>
	  already carries the landmark name; we don't want a nested redundant
	  region.

	  Vertical mode: the step list lives in the popover via [stepListTemplate],
	  so this ng-content slot is normally empty in vertical use; the
	  scroll-area host is hidden by CSS in that case (see stepper.css).
	  Note: a single ng-content slot is used (rather than duplicating the slot
	  across @if/@else branches) — duplicate ng-contents with the same
	  selector do not reroute reliably between conditional views.
	-->
	<interop-scroll-area
		orientation="horizontal"
		class="interop-stepper__list-scroll"
	>
		<ng-content select="ol[interop-step-list]" />
	</interop-scroll-area>
</nav>

<!--
  The popover element is hoisted to the root template scope so its template
  reference variable `#menuPopover` is visible to both triggers (the nav-
  trigger inside <nav>'s @else, and the action-bar trigger nested under
  @if(actions()) > @if(menu()==="always")). Template-ref vars declared inside
  an @if block are scoped to that block and would not be reachable from
  sibling @if branches.

  Popover content:
  - vertical + [stepListTemplate] provided: renders the consumer's ng-template
    directly, giving the popover the full rich step list (indicators, labels,
    connectors) instead of a separate listbox.
  - horizontal (or vertical without a template): renders the listbox driven by
    menuOptions(), unless menu="never".
-->
<div
	#menuPopover="interopPopover"
	interop-popover
	class="interop-stepper__menu"
	placement="top-end"
>
	@if (orientation() === "vertical" && stepListTemplate(); as tpl) {
	<ng-container
		[ngTemplateOutlet]="tpl"
		[ngTemplateOutletInjector]="injector"
	/>
	} @else if (menu() !== "never") {
	<ul
		interop-listbox
		class="interop-stepper__menu-list"
		[attr.aria-label]="menuLabel()"
		[controls]="menuOptions()"
		[value]="activeIndex()"
		(valueChange)="onMenuSelect($event)"
	></ul>
	}
</div>

<div #viewport class="interop-stepper__viewport">
	<ng-content />
</div>

@if (actions()) {
<div class="interop-stepper__actions">
	<ng-content select="[interop-stepper-actions]">
		<!--
		  Default action bar. Buttons are direct children — source order is
		  priority order. The first two are pushed to the end (primary), any
		  subsequent ones are pushed to the start (secondary). Authors can
		  rearrange visual order per-button via `order`, or invert the whole
		  bar with `flex-direction: row-reverse`.
		-->

		<button
			type="button"
			interop-button="protocol grow"
			class="interop-stepper__back"
			[disabled]="!canGoBack()"
			[focusableWhenDisabled]="true"
			(click)="back()"
		>
			<interop-icon name="tabler-arrow-narrow-left" [size]="20" />
			{{ backLabel() }}
		</button>
		<button
			type="button"
			interop-button="protocol grow"
			class="interop-stepper__next"
			[disabled]="(!canGoForward() && !canFinish()) || isFinished()"
			[focusableWhenDisabled]="true"
			(click)="onNextOrFinish()"
		>
			{{ canFinish() ? finishLabel() : nextLabel() }} @if (!canFinish()) {
			<interop-icon name="tabler-arrow-narrow-right" [size]="20" />
			}
		</button>
		@if (menu() === "always") {
		<button
			type="button"
			interop-button="protocol icon sm"
			class="interop-stepper__menu-trigger"
			[interop-popover-trigger]="menuPopover"
			[popoverHaspopup]="'menu'"
			[attr.aria-label]="menuLabel()"
		>
			<interop-icon name="tabler-list" [size]="20" />
		</button>
		<span spacer style="flex: 1"></span>

		} @if (cancellable()) {
		<button
			type="button"
			interop-button="protocol caution"
			class="interop-stepper__cancel"
			(click)="cancel.emit()"
		>
			<interop-icon
				name="tabler-circle-x"
				[size]="24"
				[strokeWidth]="2"
				[color]="'var(--_icon-color)'"
			/>
			{{ cancelLabel() }}
		</button>
		<span spacer style="flex: 1"></span>
		}
	</ng-content>
</div>
}

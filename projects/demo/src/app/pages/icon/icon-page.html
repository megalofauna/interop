<article class="demo-page">
	<header class="demo-page__header">
		<p class="demo-page__category">Components</p>
		<h1 class="demo-page__title">Icon</h1>
		<p class="demo-page__lead">
			Registry-backed SVG icon renderer. Icons are registered at any DI scope
			and referenced by name in templates. Tabler outline is the default
			iconset.
		</p>
	</header>

	<!-- ── Usage ──────────────────────────────────────────────────────────── -->
	<demo-section id="usage" heading="Usage">
		<demo-example label="Basic">
			<interop-icon name="tabler-rocket" />
			<itx-code-block language="html" [tokens]="basicTokens.value() ?? null">
				<pre><code [textContent]="basicCode"></code></pre>
			</itx-code-block>
		</demo-example>

		<demo-example label="Sizes">
			<div style="display: flex; align-items: center; gap: 1.5rem">
				<interop-icon name="tabler-bell" [size]="16" />
				<interop-icon name="tabler-bell" [size]="24" />
				<interop-icon name="tabler-bell" [size]="32" />
				<interop-icon name="tabler-bell" [size]="48" />
			</div>
			<itx-code-block language="html" [tokens]="sizesTokens.value() ?? null">
				<pre><code [textContent]="sizesCode"></code></pre>
			</itx-code-block>
		</demo-example>

		<demo-example label="Stroke weight">
			<div style="display: flex; align-items: center; gap: 1.5rem">
				<interop-icon name="tabler-star" [size]="32" [strokeWidth]="1" />
				<interop-icon name="tabler-star" [size]="32" [strokeWidth]="1.5" />
				<interop-icon name="tabler-star" [size]="32" [strokeWidth]="2" />
				<interop-icon name="tabler-star" [size]="32" [strokeWidth]="3" />
			</div>
			<itx-code-block language="html" [tokens]="strokeTokens.value() ?? null">
				<pre><code [textContent]="strokeCode"></code></pre>
			</itx-code-block>
		</demo-example>

		<demo-example label="Color override">
			<div style="display: flex; align-items: center; gap: 1.5rem">
				<interop-icon
					name="tabler-check"
					[size]="28"
					color="var(--itx-success)"
				/>
				<interop-icon
					name="tabler-info-circle"
					[size]="28"
					color="var(--itx-info)"
				/>
				<interop-icon
					name="tabler-bolt"
					[size]="28"
					color="var(--itx-warning)"
				/>
				<interop-icon name="tabler-x" [size]="28" color="var(--itx-danger)" />
			</div>
			<itx-code-block language="html" [tokens]="colorTokens.value() ?? null">
				<pre><code [textContent]="colorCode"></code></pre>
			</itx-code-block>
		</demo-example>
	</demo-section>

	<!-- ── Registration ──────────────────────────────────────────────────── -->
	<demo-section id="registration" heading="Registration">
		<demo-example label="provideInteropIcons">
			<itx-code-block
				language="typescript"
				[tokens]="registerTokens.value() ?? null"
			>
				<pre><code [textContent]="registerCode"></code></pre>
			</itx-code-block>
		</demo-example>
	</demo-section>

	<!-- ── Grid ──────────────────────────────────────────────────────────── -->
	<demo-section id="grid" heading="Icon grid">
		<div class="icon-page__grid">
			@for (name of gridIcons; track name) {
			<div class="icon-page__grid-item">
				<interop-icon [name]="name" [size]="24" />
				<span class="icon-page__grid-label">{{ name }}</span>
			</div>
			}
		</div>
	</demo-section>

	<!-- ── API — Inputs ───────────────────────────────────────────────────── -->
	<demo-section id="api-inputs" heading="Inputs">
		<table interop-table [collection]="apiEntries" [columns]="apiColumns">
			<ng-template itxCell="name" let-entry>
				<code class="demo-page__api-name">{{ entry.name }}</code>
				@if (entry.required) { <span class="demo-page__required">*</span> }
			</ng-template>
			<ng-template itxCell="type" let-entry>
				<code class="demo-page__api-type">{{ entry.type }}</code>
			</ng-template>
			<ng-template itxCell="default" let-entry>
				<code class="demo-page__api-default">{{ entry.default }}</code>
			</ng-template>
		</table>
	</demo-section>
	<!-- ── Notes ─────────────────────────────────────────────────────────── -->
	<demo-section id="notes" heading="Notes">
		<demo-notes [notes]="notes" />
	</demo-section>
</article>

<header class="shell__header">
	<div class="shell__header-start">
		<button
			interop-button="icon"
			itx-radius="lg"
			class="shell__menu-btn"
			command="toggle-popover"
			commandfor="site-nav"
			aria-label="Toggle navigation"
		>
			<interop-icon name="tabler-layout-sidebar-left-expand" [size]="24"></interop-icon>
		</button>
		<span class="shell__title">Interop</span>
		@if (meta().title) {
		<span class="shell__crumb" aria-hidden="true">
			<span class="shell__crumb-sep">›</span>
			@if (meta().category) {
			<span class="shell__crumb-category">{{ meta().category }}</span>
			<span class="shell__crumb-sep">›</span>
			}
			<span class="shell__crumb-title">{{ meta().title }}</span>
		</span>
		}
	</div>

	<nav class="shell__nav" aria-label="Main">
		<a
			class="shell__nav-link"
			routerLink="/Ethos"
			routerLinkActive="shell__nav-link--active"
			>Ethos</a
		>
		<a
			class="shell__nav-link"
			routerLink="/Components"
			routerLinkActive="shell__nav-link--active"
			>Components</a
		>
		<a
			class="shell__nav-link"
			routerLink="/rigs"
			routerLinkActive="shell__nav-link--active"
			>Rigs</a
		>
		<a
			class="shell__nav-link"
			routerLink="/composites"
			routerLinkActive="shell__nav-link--active"
			>Composites</a
		>
	</nav>

	<div class="shell__header-end">
		<button
			class="shell__cmdk"
			type="button"
			(click)="openPalette()"
			aria-label="Search — command palette"
		>
			<span>Search</span>
			<kbd interop-kbd>⌘K</kbd>
		</button>
		<demo-theme-toggle />
	</div>
</header>

<demo-nav class="shell__sidebar" />

<main class="shell__content">
	<router-outlet />
</main>

<!-- ⌘K / Ctrl+K opens the command palette (the hotkey listens on document). -->
<div interopHotkey="mod+k" (hotkey)="openPalette()" hidden></div>

<dialog
	interop-command-palette
	label="Command palette"
	placeholder="Search pages…"
	[open]="paletteOpen()"
	(closed)="paletteOpen.set(false)"
	[commands]="filteredCommands()"
	(queryChange)="query.set($event)"
	(command)="runCommand($event)"
></dialog>

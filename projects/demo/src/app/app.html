<header class="shell__header">
	<button
		class="shell__menu-btn"
		(click)="toggleNav()"
		aria-label="Toggle navigation"
	>
		<svg
			width="20"
			height="20"
			viewBox="0 0 24 24"
			fill="none"
			stroke="currentColor"
			stroke-width="2"
			stroke-linecap="round"
		>
			<line x1="3" y1="6" x2="21" y2="6" />
			<line x1="3" y1="12" x2="21" y2="12" />
			<line x1="3" y1="18" x2="21" y2="18" />
		</svg>
	</button>
	<span class="shell__title">Interop</span>
	<demo-theme-toggle />
</header>

<div class="shell__body">
	<demo-nav [open]="navOpen()" (closed)="navOpen.set(false)" />
	<main class="shell__content">
		<router-outlet />
	</main>
</div>

name: Build and Deploy MkDocs site

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "package.json"
      - "tsconfig*.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent parallel deployments
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install MkDocs and plugins
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs mkdocs-redirects

      - name: Install Node dependencies
        run: npm ci

      # Optional: run TypeScript build to ensure types are sound (uncomment if desired)
      # - name: Build library
      #   run: npm run build

      - name: Build MkDocs site (generate API then build)
        run: |
          npm run docs:api
          mkdocs build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
